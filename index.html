<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Můj kalendář směn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calendar">
        <header>
            <button id="prev">←</button>
            <button id="next">→</button>
            <h2 id="monthYear">Březen 2026</h2>
            <button id="today">Dnes</button>
            <button id="settingsBtn">Nastavení</button>
        </header>
        
        <div class="weekdays">
            <div>Po</div><div>Út</div><div>St</div><div>Čt</div><div>Pá</div><div>So</div><div>Ne</div>
        </div>
        
        <div id="days" class="days"></div>
    </div>

    <!-- Modal pro den -->
    <div id="dayModal" class="modal">
        <div class="modal-content">
            <span id="closeDayModal" class="close">×</span>
            <h3 id="modalDate"></h3>
            <div id="shiftsList" class="shifts-list"></div>
            <button id="addShiftBtn" class="add-btn">+ Přidat směnu</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
