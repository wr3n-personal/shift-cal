<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Můj měsíční kalendář – Směny</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calendar">
        <header>
            <button id="prev">← Předchozí</button>
            <h2 id="monthYear"></h2>
            <button id="next">Další →</button>
            <button id="today">Dnes</button>
        </header>
        
        <div class="weekdays">
            <div>Po</div><div>Út</div><div>St</div><div>Čt</div><div>Pá</div><div>So</div><div>Ne</div>
        </div>
        
        <div id="days" class="days"></div>
    </div>

    <!-- Modal pro směny -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close">&times;</span>
            <h3 id="modalDate"></h3>
            
            <div id="shiftsList" class="shifts-list"></div>
            
            <button id="addShiftBtn" class="add-btn">+ Přidat směnu</button>
            
            <!-- Formulář pro přidání směny (skrytý na začátku) -->
            <div id="addShiftForm" class="add-form" style="display: none;">
                <input type="text" id="shiftTitle" placeholder="Název směny (např. Ranní)" required>
                <input type="time" id="shiftStart" required>
                <input type="time" id="shiftEnd" required>
                <textarea id="shiftNote" placeholder="Poznámka (volitelné)"></textarea>
                <div class="form-buttons">
                    <button id="saveShiftBtn">Uložit směnu</button>
                    <button id="cancelShiftBtn">Zrušit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
