<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Můj Shift Planner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
</head>
<body>
  <div class="container">
    <header>
      <h1>🗓️ Můj Shift Planner</h1>
      <button id="add-shift-btn">+ Nová směna</button>
    </header>

    <div id="calendar"></div>

    <!-- Modal pro přidání/editaci směny -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <h2 id="modal-title">Nová směna</h2>
        <form id="shift-form">
          <input type="date" id="shift-date" required>
          <select id="shift-type" required>
            <option value="">Typ směny</option>
            <option value="ranní">Ranní</option>
            <option value="odpolední">Odpolední</option>
            <option value="noční">Noční</option>
            <option value="volno">Volno</option>
          </select>
          <input type="time" id="start-time">
          <input type="time" id="end-time">
          <input type="number" id="hours" placeholder="Počet hodin" step="0.5">
          <textarea id="note" placeholder="Poznámka"></textarea>
          <div class="buttons">
            <button type="button" id="cancel-btn">Zrušit</button>
            <button type="submit" id="save-btn">Uložit</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://unpkg.com/dexie@4.0.8/dist/modern/dexie.min.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
