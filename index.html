<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Můj kalendář směn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calendar">
        <header>
            <button id="prev">←</button>
            <h2 id="monthYear"></h2>
            <button id="next">→</button>
            <button id="today">Dnes</button>
        </header>
        
        <div class="weekdays">
            <div>Po</div><div>Út</div><div>St</div><div>Čt</div><div>Pá</div><div>So</div><div>Ne</div>
        </div>
        
        <div id="days" class="days"></div>
    </div>

    <!-- Modal -->
    <div id="dayModal" class="modal">
        <div class="modal-content">
            <span id="closeDayModal" class="close">×</span>
            <h3 id="modalDate"></h3>
            
            <div id="shiftsList" class="shifts-list"></div>
            
            <button id="addShiftBtn" class="add-btn">+ Přidat směnu</button>

            <!-- Hezký formulář -->
            <div id="addShiftForm" class="add-form" style="display: none;">
                <div class="segmented-control">
                    <button id="typeStandard" class="segment active">Standard</button>
                    <button id="typeExpress" class="segment">Express</button>
                </div>

                <select id="shiftKind" class="full-width">
                    <option value="">Vyber druh směny</option>
                    <option value="Ranní">Ranní</option>
                    <option value="Odpolední">Odpolední</option>
                    <option value="Celodenní">Celodenní</option>
                </select>

                <div class="time-row">
                    <input type="time" id="shiftStart" required>
                    <span>–</span>
                    <input type="time" id="shiftEnd" required>
                </div>

                <textarea id="shiftNote" placeholder="Poznámka (volitelné)"></textarea>

                <div class="form-buttons">
                    <button id="saveShiftBtn">Uložit směnu</button>
                    <button id="cancelShiftBtn">Zrušit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
